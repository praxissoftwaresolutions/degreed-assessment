name: Build and Push to ACR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Required for requesting the OIDC JWT
      contents: read
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          az acr login --name ${{ env.REGISTRY }}
      
      - name: Build and push API to ACR
        uses: docker/build-push-action@v4
        with:
          context: src/BackendApi
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ github.run_id }}

      - name: Build and push Web to ACR
        uses: docker/build-push-action@v4
        with:
          context: src/FrontendWeb
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ github.run_id }}
