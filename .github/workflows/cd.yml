name: Deploy to AKS

on:
  workflow_run:
    workflows: [ "Build and Push to ACR" ]
    branches: [ main ]
    types: [ completed ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy via Command Invoke
        run: |
          az aks command invoke \
            --resource-group degreed_cls_assessment_cluster_group \
            --name DegreedCluser \
            --command "kubectl apply -f k8s/BackendApi/service-account.yaml -f k8s/BackendApi/service.yaml -f k8s/BackendApi/deployment.yaml -f k8s/FrontendWeb/service.yaml -f k8s/FrontendWeb/deployment.yaml" \
            --file k8s/
