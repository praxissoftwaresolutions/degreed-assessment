name: Deploy to AKS

on:
  workflow_run:
    workflows: [ "Build and Push to ACR" ]
    branches: [ main ]
    types: [ completed ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Required for requesting the OIDC JWT
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Add this line

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          use-kubelogin: 'true' # This enables kubelogin automatically

      - name: List files for debugging
        run: |
          pwd
          ls -R k8s/

      - name: Get Runner IP
        run: |
          # Find the public IP of the GitHub Runner
          RUNNER_IP=$(curl -s https://ipify.org)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV

      - name: Whitelist Runner IP in AKS
        run: |
          # Get existing ranges so we don't overwrite them
          EXISTING_RANGES=$(az aks show -g ${{ vars.AKS_RESOURCE_GROUP }} -n ${{ vars.AKS_CLUSTER_NAME }} --query apiServerAccessProfile.authorizedIpRanges -o tsv | tr '\n' ',')
          
          # Add the current runner IP to the list
          az aks update \
            -g ${{ vars.AKS_RESOURCE_GROUP }} \
            -n ${{ vars.AKS_CLUSTER_NAME }} \
            --api-server-authorized-ip-ranges "${EXISTING_RANGES}${{ env.RUNNER_IP }}"

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/BackendApi/service.yaml
            k8s/FrontendWeb/service.yaml
            k8s/BackendApi/service-account.yaml
            k8s/BackendApi/deployment.yaml
            k8s/FrontendWeb/deployment.yaml

      - name: Remove Runner IP from Whitelist
        if: always()
        run: |
          # This keeps your original authorized ranges and removes the temporary runner IP
          CLEAN_RANGES=$(az aks show -g ${{ vars.AKS_RESOURCE_GROUP }} -n ${{ vars.AKS_CLUSTER_NAME }} --query apiServerAccessProfile.authorizedIpRanges -o tsv | tr '\n' ',' | sed "s/${{ env.RUNNER_IP }},//g" | sed "s/,${{ env.RUNNER_IP }}//g")
          
          az aks update -g ${{ vars.AKS_RESOURCE_GROUP }} -n ${{ vars.AKS_CLUSTER_NAME }} --api-server-authorized-ip-ranges "$CLEAN_RANGES"

            