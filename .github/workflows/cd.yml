name: Deploy to AKS

on:
  workflow_run:
    workflows: [ "Build and Push to ACR" ]
    branches: [ main ]
    types: [ completed ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy via Command Invoke
        # Use the 'working-directory' property to move into the k8s folder
        working-directory: k8s
        run: |
          az aks command invoke \
            --resource-group ${{ vars.AKS_RESOURCE_GROUP }} \
            --name ${{ vars.AKS_CLUSTER_NAME }} \
            --command "kubectl apply -f BackendApi/service-account.yaml -f BackendApi/service.yaml -f BackendApi/deployment.yaml -f FrontendWeb/service.yaml -f FrontendWeb/deployment.yaml" \
            --file .

