apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: web
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/health"
spec:
  type: LoadBalancer # Creates a Public IP for your demo
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 8080